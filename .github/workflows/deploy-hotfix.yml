name: Hotfix Pipeline

on:
  push:
    branches:
      - 'production'

permissions:
  contents: write

concurrency:
  group: hotfix-production
  cancel-in-progress: true

jobs:
  # 1. Deploy & Tag Production
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
          ref: production

      - name: Setup & Build
        uses: ./.github/actions/build
        with: 
          CLOUDFLARE_ENV: production
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      
      - name: Run D1 Migrations (Production)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply perfin --env production --remote
          environment: production

      - name: Deploy to Production
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
          environment: production
      
      - name: Tag Production Release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f prod-latest
          git push origin prod-latest --force

  # 2. Create Back-merge
  back-merge:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge into main
        run: |
          git fetch origin production
          git merge origin/production --ff-only
      - name: Push to origin
        run: git push origin main