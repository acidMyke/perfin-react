name: Main Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # 1. Update Tags
  tag-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}    

  # 2. Deploy & Tag Staging
  deploy-staging:
    needs: tag-version
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Setup & Build
        uses: ./.github/actions/build
        with: 
          CLOUDFLARE_ENV: staging
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      
      - name: Run D1 Migrations (Staging)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: staging
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply perfin-staging --env staging --remote
          environment: staging
      
      - name: Deploy to Staging
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: staging
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging --tag ${{ needs.tag-version.outputs.new_version }}
          environment: staging
      
      - name: Tag Staging Release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f staging-latest
          git push origin staging-latest --force

  # 3. Deploy Production, Tag, & Create Release Branch
  deploy-production:
    needs: [tag-version, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Setup & Build
        uses: ./.github/actions/build
        with: 
          CLOUDFLARE_ENV: production
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Run D1 Migrations (Production)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply perfin --env production --remote
          environment: production
      
      - name: Deploy to Production
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: production
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production --tag ${{ needs.tag-version.outputs.new_version }}
          environment: production
      
      - name: Tag Production Release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f prod-latest
          git push origin prod-latest --force
      
      - name: Update production branch
        run: git push origin main:production