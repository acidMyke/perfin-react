name: Build Perfin
description: build perfin
inputs:
  CLOUDFLARE_ENV:
    description: cloudflare env
    required: true
  GOOGLE_MAPS_API_KEY:
    description: google map api key
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node
      id: node
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: latest

    - name: Get pnpm store path
      run: echo "PNPM_STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV
      shell: bash

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ env.PNPM_STORE_PATH }}
        key: ${{ runner.os }}-node-${{ steps.node.outputs.node-version }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
      shell: bash

    - name: Cache Vite
      uses: actions/cache@v4
      with:
        path: node_modules/.vite
        key: ${{ runner.os }}-vite-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-vite-

    - name: Build
      run: pnpm build
      shell: bash
      env:
        CI: true
        CLOUDFLARE_ENV: ${{ inputs.CLOUDFLARE_ENV }}
        VITE_GOOGLE_MAPS_API_KEY: ${{ inputs.GOOGLE_MAPS_API_KEY }}